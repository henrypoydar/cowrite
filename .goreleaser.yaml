# Release config for milestone 8. Prereqs, once the project goes public:
#   gh repo create henrypoydar/cowrite --public --source . --push
#   gh repo create henrypoydar/homebrew-tap --public
#   git tag v0.1.0 && GITHUB_TOKEN=... goreleaser release --clean
version: 2

project_name: cowrite

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - arm64
      - amd64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]

# goreleaser dropped Homebrew formulas (brews) for casks; a cask ships the
# prebuilt binary rather than building from source.
homebrew_casks:
  - repository:
      owner: henrypoydar
      name: homebrew-tap
    homepage: https://github.com/henrypoydar/cowrite
    description: Vim-flavored terminal markdown editor for co-writing with AI agents
    # The binary is unsigned, so Gatekeeper quarantines it on download; strip
    # the attribute post-install so `cowrite` runs without a security prompt.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/cowrite"]
          end

changelog:
  use: git
